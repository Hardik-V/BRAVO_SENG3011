name: Create Lambda Layer
on:
  workflow_dispatch:

jobs:
  create-layer:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-2
    steps:
      - name: Build base layer (boto3 + yfinance)
        run: |
          mkdir python
          pip install yfinance boto3 -t python/
          zip -r base-layer.zip python/
          aws s3 cp base-layer.zip s3://${{ secrets.AWS_BUCKET_NAME }}/dev/base-layer.zip
          aws lambda publish-layer-version \
            --layer-name bravo-base \
            --content S3Bucket=${{ secrets.AWS_BUCKET_NAME }},S3Key=dev/base-layer.zip \
            --compatible-runtimes python3.11

      - name: Build visualisation layer (matplotlib)
        run: |
          rm -rf python
          mkdir python
          pip install matplotlib -t python/
          zip -r viz-layer.zip python/
          aws s3 cp viz-layer.zip s3://${{ secrets.AWS_BUCKET_NAME }}/dev/viz-layer.zip
          aws lambda publish-layer-version \
            --layer-name bravo-visualisation \
            --content S3Bucket=${{ secrets.AWS_BUCKET_NAME }},S3Key=dev/viz-layer.zip \
            --compatible-runtimes python3.11
