name: "Combined Test Report"

on:
  workflow_dispatch:
    inputs:
      skip_integration:
        description: "Skip integration tests? (true/false)"
        required: false
        default: "false"
      skip_e2e:
        description: "Skip E2E tests? (true/false)"
        required: false
        default: "false"

jobs:
  combined-report:
    name: "Run All Tests & Generate Combined Report"
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://b5hxtt8xp6.execute-api.ap-southeast-2.amazonaws.com/dev' }}
      API_KEY:      ${{ secrets.API_KEY      || 'ecosystem-secret-123' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r test-service/requirements.txt

      - name: Create reports directory
        run: mkdir -p test-service/reports

      # ── Unit Tests ──────────────────────────────────────────────────────────
      - name: Run unit tests
        run: |
          pytest test-service/tests/unit \
            -v --tb=short \
            --json-report \
            --json-report-file=test-service/reports/unit_report.json \
            --json-report-indent=2 \
            || true

      # ── Integration Tests ───────────────────────────────────────────────────
      - name: Run integration tests
        if: ${{ inputs.skip_integration != 'true' }}
        run: |
          pytest test-service/tests/integration \
            -v --tb=short \
            --json-report \
            --json-report-file=test-service/reports/integration_report.json \
            --json-report-indent=2 \
            || true

      # ── E2E Tests ───────────────────────────────────────────────────────────
      - name: Run E2E tests
        if: ${{ inputs.skip_e2e != 'true' }}
        run: |
          pytest test-service/tests/e2e \
            -v --tb=short \
            --json-report \
            --json-report-file=test-service/reports/e2e_report.json \
            --json-report-indent=2 \
            || true

      # ── Combined PDF ────────────────────────────────────────────────────────
      - name: Generate combined PDF report
        run: |
          # Build args dynamically based on which JSONs exist
          ARGS="--unit test-service/reports/unit_report.json"
          [ -f test-service/reports/integration_report.json ] && ARGS="$ARGS --integration test-service/reports/integration_report.json"
          [ -f test-service/reports/e2e_report.json ]         && ARGS="$ARGS --e2e test-service/reports/e2e_report.json"

          python test-service/combined_report.py \
            $ARGS \
            --output test-service/reports/Combined_Test_Report.pdf \
            --test-dirs test-service/tests

      # ── Also generate individual PDFs ───────────────────────────────────────
      - name: Generate individual phase PDFs
        run: |
          python test-service/test_runner.py \
            test-service/reports/unit_report.json \
            test-service/reports/Unit_Test_Report.pdf \
            "Unit Testing"

          if [ -f test-service/reports/integration_report.json ]; then
            python test-service/test_runner.py \
              test-service/reports/integration_report.json \
              test-service/reports/Integration_Test_Report.pdf \
              "Integration Testing"
          fi

          if [ -f test-service/reports/e2e_report.json ]; then
            python test-service/test_runner.py \
              test-service/reports/e2e_report.json \
              test-service/reports/E2E_Test_Report.pdf \
              "End-to-End Pipeline Validation"
          fi

      # ── Print summary ───────────────────────────────────────────────────────
      - name: Print overall summary
        run: |
          python - <<'EOF'
          import json, os, glob

          reports = {
              "Unit":        "test-service/reports/unit_report.json",
              "Integration": "test-service/reports/integration_report.json",
              "E2E":         "test-service/reports/e2e_report.json",
          }
          grand = {"total": 0, "passed": 0, "failed": 0}
          print("\n── Test Summary ─────────────────────────────────")
          for name, path in reports.items():
              if os.path.exists(path):
                  r = json.load(open(path))
                  s = r.get("summary", {})
                  t, p, f = s.get("total",0), s.get("passed",0), s.get("failed",0)
                  grand["total"]  += t
                  grand["passed"] += p
                  grand["failed"] += f
                  status = "✓" if f == 0 else "✗"
                  print(f"  {status} {name:15s}  total={t}  passed={p}  failed={f}")
          print(f"  {'─'*45}")
          print(f"  {'OVERALL':15s}  total={grand['total']}  passed={grand['passed']}  failed={grand['failed']}")
          print("─────────────────────────────────────────────────\n")
          EOF

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload all reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: All-Test-Reports
          path: test-service/reports/
          retention-days: 30
