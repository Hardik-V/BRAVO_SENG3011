name: Generate Test Report

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      phase:
        description: 'Test phase to run'
        required: true
        default: 'both'
        type: choice
        options:
          - unit
          - integration
          - e2e
          - both
          - all

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-2
    steps:
      - name: Invoke Testing Lambda
        id: invoke
        run: |
          FUNCTION="bravo-testing-${{ github.event.inputs.environment }}"
          PAYLOAD='{"queryStringParameters": {"phase": "${{ github.event.inputs.phase }}"}}'

          echo "$PAYLOAD" > payload.json

          aws lambda invoke \
            --function-name $FUNCTION \
            --payload file://payload.json \
            response.json

          cat response.json

          # Extract the report URL from the response
          REPORT_URL=$(cat response.json | python3 -c "
          import sys, json
          outer = json.load(sys.stdin)
          body = json.loads(outer.get('body', '{}'))
          print(body.get('report_url', ''))
          ")

          echo "report_url=$REPORT_URL" >> $GITHUB_OUTPUT
          echo "Report URL: $REPORT_URL"

      - name: Download Report PDF
        run: |
          curl -L "${{ steps.invoke.outputs.report_url }}" -o Test_Report.pdf
          echo "Report downloaded successfully"

      - name: Upload Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.event.inputs.environment }}-${{ github.run_number }}
          path: Test_Report.pdf
          retention-days: 30