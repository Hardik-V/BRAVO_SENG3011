name: Generate Test Report

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      phase:
        description: 'Test phase to run'
        required: true
        default: 'both'
        type: choice
        options:
          - unit
          - integration
          - e2e
          - both
          - all

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-2
    steps:
      - name: Clear old report
        run: |
          ENV="${{ github.event.inputs.environment }}"
          aws s3 rm "s3://bravo-adage-event-store/$ENV/reports/Unit_Integration_Report.pdf" || true

      - name: Invoke Testing Lambda (async)
        run: |
          FUNCTION="bravo-testing-${{ github.event.inputs.environment }}"
          PAYLOAD=$(echo '{"queryStringParameters": {"phase": "${{ github.event.inputs.phase }}"}}' | base64 -w 0)
          aws lambda invoke \
            --function-name $FUNCTION \
            --invocation-type Event \
            --payload "$PAYLOAD" \
            response.json
          echo "Lambda invoked asynchronously, waiting for report..."

      - name: Poll S3 for report
        run: |
          ENV="${{ github.event.inputs.environment }}"
          S3_KEY="$ENV/reports/Unit_Integration_Report.pdf"
          MAX_WAIT=600
          INTERVAL=15
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            echo "Checking S3 for report... (${ELAPSED}s elapsed)"
            if aws s3 ls "s3://bravo-adage-event-store/$S3_KEY" > /dev/null 2>&1; then
              echo "Report found, downloading..."
              aws s3 cp "s3://bravo-adage-event-store/$S3_KEY" Test_Report.pdf
              echo "Downloaded successfully"
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Timed out waiting for report"
          exit 1

      - name: Upload Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.event.inputs.environment }}-${{ github.run_number }}
          path: Test_Report.pdf
          retention-days: 30