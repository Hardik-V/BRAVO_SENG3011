name: CI/CD
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest --cov=. --cov-report=term-missing
      - run: flake8 .
      - run: mypy .

  deploy-dev:
    needs: test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-2
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Deploy Collection Lambda
        run: |
          cd collection
          pip install -r requirements.txt -t package/
          cp handler.py package/
          cd package && zip -r ../deployment.zip .
          cd ..
          aws lambda update-function-code \
            --function-name bravo-collection-dev \
            --zip-file fileb://deployment.zip

      - name: Deploy Retrieval Lambda
        run: |
          cd retrieval
          pip install -r requirements.txt -t package/
          cp handler.py package/
          cd package && zip -r ../deployment.zip .
          cd ..
          aws lambda update-function-code \
            --function-name bravo-retrieval-dev \
            --zip-file fileb://deployment.zip

      - name: Deploy Visualisation Lambda
        run: |
          cd visualisation
          pip install -r requirements.txt -t package/
          cp handler.py package/
          cd package && zip -r ../deployment.zip .
          cd ..
          aws lambda update-function-code \
            --function-name bravo-visualisation-dev \
            --zip-file fileb://deployment.zip

  deploy-prod:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-2
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Deploy Collection Lambda
        run: |
          cd collection
          pip install -r requirements.txt -t package/
          cp handler.py package/
          cd package && zip -r ../deployment.zip .
          cd ..
          aws lambda update-function-code \
            --function-name bravo-collection-prod \
            --zip-file fileb://deployment.zip

      - name: Deploy Retrieval Lambda
        run: |
          cd retrieval
          pip install -r requirements.txt -t package/
          cp handler.py package/
          cd package && zip -r ../deployment.zip .
          cd ..
          aws lambda update-function-code \
            --function-name bravo-retrieval-prod \
            --zip-file fileb://deployment.zip

      - name: Deploy Visualisation Lambda
        run: |
          cd visualisation
          pip install -r requirements.txt -t package/
          cp handler.py package/
          cd package && zip -r ../deployment.zip .
          cd ..
          aws lambda update-function-code \
            --function-name bravo-visualisation-prod \
            --zip-file fileb://deployment.zip