name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest --cov=collection --cov=retrieval --cov=visualisation --cov-report=term-missing
      - run: flake8 .
      - run: mypy --explicit-package-bases collection/handler.py retrieval/handler.py visualisation/handler.py

  deploy-dev:
    needs: test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-2
    steps:
      - uses: actions/checkout@v3

      - name: Deploy Collection Lambda
        run: |
          cd collection
          zip deployment.zip handler.py collection.py
          aws lambda update-function-code \
            --function-name bravo-collection-dev \
            --zip-file fileb://deployment.zip

      - name: Deploy Retrieval Lambda
        run: |
          cd retrieval
          zip deployment.zip handler.py
          aws lambda update-function-code \
            --function-name bravo-retrieval-dev \
            --zip-file fileb://deployment.zip

      - name: Deploy Visualisation Lambda
        run: |
          cd visualisation
          pip install requests -t .
          zip -r deployment.zip handler.py graph_service.py retrieval_service.py requests urllib3 certifi charset_normalizer idna
          aws lambda update-function-code \
            --function-name bravo-visualisation-dev \
            --zip-file fileb://deployment.zip

      - name: Deploy Testing Lambda
        run: |
          cat > conftest.py << 'EOF'
          import sys
          from unittest.mock import MagicMock
          sys.modules['yfinance'] = MagicMock()
          sys.modules['matplotlib'] = MagicMock()
          sys.modules['matplotlib.pyplot'] = MagicMock()
          sys.modules['matplotlib.patches'] = MagicMock()
          sys.modules['matplotlib.ticker'] = MagicMock()
          sys.modules['matplotlib.dates'] = MagicMock()
          EOF

          docker run --rm \
            --entrypoint pip \
            -v $(pwd):/out \
            public.ecr.aws/lambda/python:3.11 \
            install reportlab pytest-json-report pytest requests pillow \
            -t /out/deps/

          zip -r test-service/deployment.zip \
            conftest.py \
            test-service/ \
            collection/ \
            retrieval/ \
            visualisation/

          cd deps && zip -r ../test-service/deployment.zip . && cd ..

          aws lambda update-function-code \
            --function-name bravo-testing-dev \
            --zip-file fileb://test-service/deployment.zip
      - name: Deploy Frontend to S3
        run: |
          aws s3 sync frontend/ s3://bravo-constellation-app \
            --delete \
            --cache-control "no-cache"

  deploy-prod:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-2
    steps:
      - uses: actions/checkout@v3

      - name: Deploy Collection Lambda
        run: |
          cd collection
          zip deployment.zip handler.py collection.py
          aws lambda update-function-code \
            --function-name bravo-collection-prod \
            --zip-file fileb://deployment.zip

      - name: Deploy Retrieval Lambda
        run: |
          cd retrieval
          zip deployment.zip handler.py
          aws lambda update-function-code \
            --function-name bravo-retrieval-prod \
            --zip-file fileb://deployment.zip

      - name: Deploy Visualisation Lambda
        run: |
          cd visualisation
          pip install requests -t .
          zip -r deployment.zip handler.py graph_service.py retrieval_service.py requests urllib3 certifi charset_normalizer idna
          aws lambda update-function-code \
            --function-name bravo-visualisation-prod \
            --zip-file fileb://deployment.zip

      - name: Deploy Testing Lambda
        run: |
          cat > conftest.py << 'EOF'
          import sys
          from unittest.mock import MagicMock
          sys.modules['yfinance'] = MagicMock()
          sys.modules['matplotlib'] = MagicMock()
          sys.modules['matplotlib.pyplot'] = MagicMock()
          sys.modules['matplotlib.patches'] = MagicMock()
          sys.modules['matplotlib.ticker'] = MagicMock()
          sys.modules['matplotlib.dates'] = MagicMock()
          EOF

          docker run --rm \
            --entrypoint pip \
            -v $(pwd):/out \
            public.ecr.aws/lambda/python:3.11 \
            install reportlab pytest-json-report pytest requests pillow \
            -t /out/deps/

          zip -r test-service/deployment.zip \
            conftest.py \
            test-service/ \
            collection/ \
            retrieval/ \
            visualisation/

          cd deps && zip -r ../test-service/deployment.zip . && cd ..

          aws lambda update-function-code \
            --function-name bravo-testing-prod \
            --zip-file fileb://test-service/deployment.zip

      - name: Deploy Frontend to S3
        run: |
          aws s3 sync frontend/ s3://bravo-constellation-app \
            --delete \
            --cache-control "no-cache"
