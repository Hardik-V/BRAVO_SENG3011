name: CI/CD
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest --cov=. --cov-report=term-missing
      - run: flake8 .
      - run: mypy --explicit-package-bases collection/handler.py retrieval/handler.py visualisation/handler.py
  deploy-dev:
    needs: test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-2
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Collection Lambda
        run: |
          cd collection
          zip deployment.zip handler.py collection.py
          aws lambda update-function-code \
            --function-name bravo-collection-dev \
            --zip-file fileb://deployment.zip
          aws lambda wait function-updated \
            --function-name bravo-collection-dev
          aws lambda update-function-configuration \
            --function-name bravo-collection-dev \
            --timeout 60
      - name: Deploy Retrieval Lambda
        run: |
          cd retrieval
          zip deployment.zip handler.py
          aws lambda update-function-code \
            --function-name bravo-retrieval-dev \
            --zip-file fileb://deployment.zip
          aws lambda wait function-updated \
            --function-name bravo-retrieval-dev
          aws lambda update-function-configuration \
            --function-name bravo-retrieval-dev \
            --timeout 60
      - name: Deploy Visualisation Lambda
        run: |
          cd visualisation
          pip install requests -t .
          zip -r deployment.zip handler.py graph_service.py retrieval_service.py requests urllib3 certifi charset_normalizer idna
          aws lambda update-function-code \
            --function-name bravo-visualisation-dev \
            --zip-file fileb://deployment.zip
          aws lambda wait function-updated \
            --function-name bravo-visualisation-dev
          aws lambda update-function-configuration \
            --function-name bravo-visualisation-dev \
            --timeout 60
  deploy-prod:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-2
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Collection Lambda
        run: |
          cd collection
          zip deployment.zip handler.py collection.py
          aws lambda update-function-code \
            --function-name bravo-collection-prod \
            --zip-file fileb://deployment.zip
          aws lambda wait function-updated \
            --function-name bravo-collection-prod
          aws lambda update-function-configuration \
            --function-name bravo-collection-prod \
            --timeout 60
      - name: Deploy Retrieval Lambda
        run: |
          cd retrieval
          zip deployment.zip handler.py
          aws lambda update-function-code \
            --function-name bravo-retrieval-prod \
            --zip-file fileb://deployment.zip
          aws lambda wait function-updated \
            --function-name bravo-retrieval-prod
          aws lambda update-function-configuration \
            --function-name bravo-retrieval-prod \
            --timeout 60
      - name: Deploy Visualisation Lambda
        run: |
          cd visualisation
          pip install requests -t .
          zip -r deployment.zip handler.py graph_service.py retrieval_service.py requests urllib3 certifi charset_normalizer idna
          aws lambda update-function-code \
            --function-name bravo-visualisation-prod \
            --zip-file fileb://deployment.zip
          aws lambda wait function-updated \
            --function-name bravo-visualisation-prod
          aws lambda update-function-configuration \
            --function-name bravo-visualisation-prod \
            --timeout 60