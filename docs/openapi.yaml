openapi: 3.0.0
info:
  title: ADAGE 3.0 Financial Event API
  description: >-
    A RESTful API for collecting, retrieving and visualising financial market 
    event data normalised into the ADAGE 3.0 Standard Event Model.
  version: 1.0.0

servers:
  # Added by API Auto Mocking Plugin
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/unsw-f67/Bravo_api/1.0.0
  - url: https://b5hxtt8xp6.execute-api.ap-southeast-2.amazonaws.com/dev
    description: Development
  - url: https://b5hxtt8xp6.execute-api.ap-southeast-2.amazonaws.com/prod
    description: Production

security:
  - ApiKeyAuth: []

paths:
  /collect/financial:
    post:
      summary: Trigger collection of financial market data
      description: >-
        Accepts a ticker symbol and date range, fetches historical market data
        from Yahoo Finance, normalises it into the ADAGE 3.0 event model,
        and stores it in AWS S3.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ticker
                - from
                - to
              properties:
                ticker:
                  type: string
                  example: "AAPL"
                from:
                  type: string
                  format: date
                  example: "2024-01-01"
                to:
                  type: string
                  format: date
                  example: "2024-01-10"
      responses:
        '201':
          description: Data successfully collected and stored in S3
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: "dev/financial/AAPL_2024-01-01_2024-01-10.json"
        '400':
          description: Invalid ticker symbol or date range
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "invalid parameters: ticker, from, and to are required"
        '401':
          description: Unauthorized - missing or invalid API key
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "server error: ..."

  /collect/health:
    get:
      summary: Collection service health check
      security: []
      responses:
        '200':
          description: Collection service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  service:
                    type: string
                    example: "bravo-collection"
                  version:
                    type: string
                    example: "1.0.0"

  /retrieve/financial:
    get:
      summary: Retrieve stored financial event data
      description: >-
        Fetches stored financial event data from AWS S3 for a given ticker
        and date range, returned in ADAGE 3.0 format.
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
          example: "AAPL"
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-01"
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-10"
      responses:
        '200':
          description: Successfully retrieved financial event data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Adage3Event'
        '400':
          description: Invalid ticker symbol or date range
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Missing required query parameters: ticker, from, to"
        '401':
          description: Unauthorized - missing or invalid API key
        '404':
          description: No data found for the requested ticker and date range
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "No data found for the requested params"
        '500':
          description: Internal server error

  /retrieve/health:
    get:
      summary: Retrieval service health check
      security: []
      responses:
        '200':
          description: Retrieval service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  service:
                    type: string
                    example: "bravo-retrieval"
                  version:
                    type: string
                    example: "1.0.0"

  /visualise/financial:
    get:
      summary: Get a price chart for a given ticker
      description: >-
        Returns a time series price chart for the specified financial instrument
        and date range. Data is retrieved from the ADAGE 3.0 event store in S3
        and rendered as a chart image or embeddable JSON object.
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
          example: "AAPL"
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-01"
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-10"
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [png, json]
            default: png
          description: Output format - PNG image or embeddable chart JSON
      responses:
        '200':
          description: Successfully generated price chart
          content:
            image/png:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                properties:
                  chart_type:
                    type: string
                    example: "time_series"
                  ticker:
                    type: string
                    example: "AAPL"
                  from:
                    type: string
                    example: "2024-01-01"
                  to:
                    type: string
                    example: "2024-01-10"
                  chart_data:
                    type: object
                    description: Embeddable chart JSON for frontend rendering
        '400':
          description: Invalid ticker symbol or date range
        '401':
          description: Unauthorized - missing or invalid API key
        '404':
          description: No financial data found for the requested ticker and date range
        '500':
          description: Internal server error

  /visualise/health:
    get:
      summary: Visualisation service health check
      security: []
      responses:
        '200':
          description: Visualisation service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  service:
                    type: string
                    example: "bravo-visualisation"
                  version:
                    type: string
                    example: "1.0.0"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    Adage3Event:
      type: object
      properties:
        data_source:
          type: string
          example: "Yahoo Finance"
        dataset_type:
          type: string
          example: "Financial Records"
        dataset_id:
          type: string
          example: "s3://bravo-adage-event-store/dev/financial/AAPL_2024-01-01_2024-01-10.json"
        dataset_time_object:
          type: object
          properties:
            timestamp:
              type: string
              example: "2026-03-17T07:36:16.772248+00:00"
            timezone:
              type: string
              example: "UTC"
        event:
          type: object
          properties:
            event_time_object:
              type: object
              properties:
                timestamp:
                  type: string
                  example: "2024-01-09T00:00:00Z"
                duration:
                  type: integer
                  example: 86400
                unit:
                  type: string
                  example: "seconds"
                timezone:
                  type: string
                  example: "UTC"
            event_type:
              type: string
              example: "financial_market_reading"
            event_attributes:
              type: object
              properties:
                ticker:
                  type: string
                  example: "AAPL"
                open:
                  type: number
                  example: 182.03
                high:
                  type: number
                  example: 183.25
                low:
                  type: number
                  example: 180.85
                close:
                  type: number
                  example: 183.24
                volume:
                  type: integer
                  example: 42841800
